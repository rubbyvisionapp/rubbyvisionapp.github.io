<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <title>News - MoonlightBay Plus</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="feed-container" id="rss-feed"></div>

  <script>
    const rssUrl = "https://www.antaranews.com/rss/terkini.xml"; // Replace with your RSS feed
    const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`;

    function timeAgo(dateString) {
    const now = new Date();
    const then = new Date(dateString);
    const seconds = Math.floor((now - then) / 1000);

    const intervals = [
      { label: 'year', seconds: 31536000 },
      { label: 'month', seconds: 2592000 },
      { label: 'week', seconds: 604800 },
      { label: 'day', seconds: 86400 },
      { label: 'h', seconds: 3600 },
      { label: 'm', seconds: 60 },
      { label: 's', seconds: 1 },
    ];

    for (const interval of intervals) {
      const count = Math.floor(seconds / interval.seconds);
      if (count >= 1) {
        return `${count}${interval.label} ago`;
      }
    }
    return 'Just now';
  }
    
    fetch(apiUrl)
      .then(response => response.json())
      .then(data => {
        const container = document.getElementById("rss-feed");
        data.items.slice(0, 90).forEach(item => {
          const div = document.createElement("div");
          div.className = "feed-item";
          div.innerHTML = `
            <h3><a href="${item.link}" target="_blank">${item.title}</a></h3>
            <p>${item.description.substring(0, 350)}...</p>
            <time>${timeAgo(item.pubDate)}</time>
          `;
          container.appendChild(div);
        });
      })
      .catch(error => {
        document.getElementById("rss-feed").innerText = "Error loading feed.";
        console.error("Error fetching RSS feed:", error);
      });
  </script>
</body>
</html>
